<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles - EduEx</title>
    <link rel="stylesheet" href="css/Profile.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="chatbot">
      <a href="chat.html"><img src="assets/chatbot.jpg" alt="EduBot"></a>
    </div>
    <header>
        <nav>
          <div class="logo">
              <span>Edu</span><span>Ex</span>
          </div>
          <ul class="nav-links">
              <li><a href="index.html">Home</a></li>
              <li><a href="Resource.html">Explore</a></li>
              <li><a href="#" class="active">Profiles</a></li>
          </ul>
          <div class="auth-profile">
            <a href="#" class="notification"><i class="fa-regular fa-bell"></i></a>
            <a href="Interaction.html" class="chat"><i class="fa-regular fa-message"></i></a>
            <div class="auth-links">
                <a class="login-btn" href="User_Dashboard.html"><i class="fa-solid fa-user" style="color: var(--accent-primary);"></i></a>
            </div>
          </div>
          <div class="menu-toggle"><i class="fa-solid fa-bars"></i></div>
        </nav>
    </header>

    <div class="main-sec1">
        <h2>Learn interactively with thousands of Peer Tutors...</h2>
        <section id="search-bar">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search for a skill (e.g. Python, Graphic Design)..." onkeyup="if(event.key==='Enter') searchUsers()">
                <button onclick="searchUsers()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </section>

        <section id="navbar">
            <div class="navbar">
              <a href="#" onclick="filterByCategory('Web')">Web Developer</a>
              <a href="#" onclick="filterByCategory('Design')">Design</a>
              <a href="#" onclick="filterByCategory('Data')">Data Science</a>
              <a href="#" onclick="filterByCategory('Marketing')">Marketing</a>
              <a href="#" onclick="filterByCategory('Cyber')">Cyber Security</a>
              <a href="#" onclick="loadAllUsers()">All Users</a>
            </div>
        </section>
    </div>

    <main>
        <!-- Content will be injected dynamically via JS API -->
        <div id="usersGrid" class="subcourses">
            <!-- Loading indicator -->
            <div style="text-align: center; width: 100%; grid-column: 1 / -1; padding: 50px; color: var(--text-secondary);">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                <p>Loading users...</p>
            </div>
        </div>
    </main> 

    <!-- Dynamic Popup Modal inside body -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close-btn" onclick="closeProfilePopup()">&times;</span>
            <img src="assets/SSD.jpg" alt="Profile" id="popup-avatar" class="profile-pic">
            <h2 id="popup-name">User Name</h2>
            <p><strong>Skills:</strong> <span id="popup-skill"></span></p>
            <p><strong>Bio:</strong> <span id="popup-bio"></span></p>
            
            <div class="social-links">
                <a id="popup-github" href="#" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a id="popup-linkedin" href="#" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
            </div>
            
            <!-- Skill Swap Request Form -->
            <div id="request-form-area" style="text-align: left; margin-top: 20px; display: none;">
                <p style="font-size: 0.85rem; margin-bottom: 5px;">I want to learn:</p>
                <input type="text" id="skillWanted" placeholder="e.g. React.js" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--bg-main); color: white; margin-bottom: 15px;">
                
                <p style="font-size: 0.85rem; margin-bottom: 5px;">I can teach:</p>
                <input type="text" id="skillOffered" placeholder="e.g. Photoshop" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--bg-main); color: white; margin-bottom: 15px;">
            </div>

            <button id="send-request-btn" class="send-request-btn" onclick="submitSkillRequest()">Send Skill Swap Request</button>
            <p id="request-sent-msg" class="request-sent-msg"><i class="fa-solid fa-check"></i> Request successfully sent!</p>
        </div>
    </div>

    <!-- Need minimal script includes to handle auth check and fetching -->
    <script src="javascript/api.js"></script>
    <script src="javascript/Profile.js"></script>
</body>
</html>
