<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot - Your Learning Assistant</title>
    <!-- We can reuse Interaction.css since it's already a chat layout! -->
    <link rel="stylesheet" href="css/Interaction.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Small overrides for the standalone bot page */
        .chat-app-container { justify-content: center; background: var(--bg-main); padding: 20px;}
        .chat-main { 
            max-width: 800px; 
            height: calc(100vh - 40px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }
        .header-avatar { border: 2px solid var(--accent-primary); }
        .back-nav {
            position: absolute; top: 20px; left: 20px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 1.2rem; display: flex; align-items: center; gap: 8px;
            transition: var(--transition); z-index: 1000;
        }
        .back-nav:hover { color: white; transform: translateX(-5px); }
        .bot-pulse {
            width: 10px; height: 10px; background: #f7ac1b; border-radius: 50%;
            display: inline-block; box-shadow: 0 0 10px #f7ac1b;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(247, 172, 27, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(247, 172, 27, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(247, 172, 27, 0); }
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-nav"><i class="fa-solid fa-arrow-left"></i> Back</a>

    <div class="chat-app-container">
        <!-- Main Chat Area -->
        <main class="chat-main" id="chat-main">
            
            <!-- Active Chat Header -->
            <div class="chat-header" id="active-chat-header">
                <div class="chat-user-info">
                    <img src="assets/chatbot.jpg" alt="EduBot" class="header-avatar">
                    <div class="header-details">
                        <h3 id="chat-name">EduBot Assistant</h3>
                        <span class="status"><span class="bot-pulse"></span> Online</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" onclick="document.getElementById('chatbox').innerHTML = ''" title="Clear Chat"><i class="fa-solid fa-trash"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-body" id="chatbox">
                <!-- Initial Bot Message -->
                <div class="message received">
                    <img src="assets/chatbot.jpg" alt="EduBot" class="msg-avatar">
                    <div class="msg-bubble">
                        <p>Hello! I am EduBot, your personal learning assistant. How can I help you today? Try asking me about HTML, CSS, JavaScript, Python, or even Cybersecurity!</p>
                        <span class="msg-time">Just now</span>
                    </div>
                </div>
            </div>

            <!-- Quick Replies -->
            <div class="quick-replies" style="padding: 10px 20px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap;">
                <button onclick="sendQuickReply('What is HTML?')" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s;">What is HTML?</button>
                <button onclick="sendQuickReply('What is Python?')" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s;">What is Python?</button>
                <button onclick="sendQuickReply('Explain Machine Learning')" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s;">Explain ML</button>
            </div>

            <!-- Chat Footer (Input) -->
            <div class="chat-footer" id="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask EduBot something..." onkeydown="handleEnter(event)">
                </div>
                <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <!-- We fix the typo-ridden keyword matching logic from the original file -->
    <script>
        const responses = {
            "hello": "Hello! How can I help you today?",
            "hi": "Hi there! What are you looking to learn?",
            "how are you": "I'm just a bot, but I'm doing great! How about you?",
            "what is your name": "I'm EduBot, built to help you navigate EduEx.",
            "what is html": "HTML (HyperText Markup Language) is the standard markup language for documents designed to be displayed in a web browser. It defines the structure of web pages.",
            "what is css": "CSS (Cascading Style Sheets) is a stylesheet language used to describe the presentation of a document written in HTML. It controls layout, colors, and fonts.",
            "what is javascript": "JavaScript is a versatile programming language primarily used for creating interactive and dynamic content on websites. It runs in the browser and can update HTML/CSS in real-time.",
            "what is a variable": "A variable is a symbolic name associated with a value and whose associated value may be changed. Think of it as a container for storing data.",
            "what is a function": "A function is a block of organized, reusable code that is used to perform a single, related action. It helps keep code modular and readable.",
            "what is python": "Python is a high-level, general-purpose programming language known for its readability and concise syntax. It's widely used in data science, AI, web development, and automation.",
            "what is java": "Java is a high-level, class-based, object-oriented programming language that is designed to have as few implementation dependencies as possible (Write Once, Run Anywhere).",
            "what is c++": "C++ is a general-purpose programming language created as an extension of the C programming language. It has imperative, object-oriented, and generic programming features.",
            "what is database": "A database is an organized collection of data, generally stored and accessed electronically from a computer system. Common types include relational (SQL) and NoSQL databases.",
            "what is sql": "SQL (Structured Query Language) is a standard language for managing data held in a relational database management system.",
            "what is api": "API stands for Application Programming Interface. It is a set of rules and protocols for building and interacting with software applications, allowing different systems to communicate.",
            "what is machine learning": "Machine learning is a subset of artificial intelligence that involves the development of algorithms that allow computers to learn from and make predictions or decisions based on data.",
            "what is artificial intelligence": "Artificial intelligence (AI) is the simulation of human intelligence processes by machines, especially computer systems. These processes include learning, reasoning, and self-correction.",
            "what is ethical hacking": "Ethical hacking involves an authorized attempt to gain unauthorized access to a computer system, application, or data to identify vulnerabilities before malicious hackers can exploit them.",
            "what is blockchain": "A blockchain is a decentralized, distributed, and public digital ledger that is used to record transactions across many computers so that the record cannot be altered retroactively.",
            "what is algorithm": "An algorithm is a finite sequence of well-defined instructions used to solve a specific problem or perform a computation.",
            "what is recursion": "Recursion in computer science is a method where the solution to a problem depends on solutions to smaller instances of the same problem. Usually implemented as a function calling itself.",
            "default": "I'm sorry, I don't understand that question yet. Try asking 'what is JavaScript' or 'what is Python'."
        };

        let chatHistory = [];

        async function renderInitialChat() {
            const chatbox = document.getElementById("chatbox");
            chatbox.innerHTML = '';
            
            try {
                if (isLoggedIn()) {
                    const history = await getBotHistory();
                    if (history && history.length > 0) {
                        chatHistory = history;
                    }
                }
            } catch (err) {
                console.error("Failed to load bot history from backend", err);
            }
            
            if (chatHistory.length === 0) {
                const initialMsg = { 
                    sender: 'bot', 
                    content: 'Hello! I am EduBot, your personal learning assistant. How can I help you today? Try asking me about HTML, CSS, JavaScript, Python, or even Cybersecurity!', 
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                };
                chatHistory.push(initialMsg);
                // Save initial message to backend if logged in
                if(isLoggedIn()) await saveBotMessage(initialMsg.sender, initialMsg.content);
            }

            chatHistory.forEach(msg => {
                let messageHTML = '';
                // Format time handle both DB timestamp and local time string
                const timeStr = msg.time.includes('T') ? new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : msg.time;

                if (msg.sender === 'user') {
                    messageHTML = `
                        <div class="message sent">
                            <div class="msg-bubble">
                                <p>${msg.content}</p>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        </div>
                    `;
                } else {
                    messageHTML = `
                        <div class="message received" style="animation: fadeIn 0.3s ease-out">
                            <img src="assets/chatbot.jpg" alt="EduBot" class="msg-avatar">
                            <div class="msg-bubble">
                                <p>${msg.content}</p>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        </div>
                    `;
                }
                chatbox.insertAdjacentHTML('beforeend', messageHTML);
            });
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function clearChat() {
            chatHistory = [];
            try {
                if(isLoggedIn()) await clearBotHistory();
            } catch(e) {
                console.error("Error clearing chat from backend");
            }
            renderInitialChat();
        }
        
        // Bind clear chat button
        document.querySelector('.chat-actions .icon-btn').onclick = clearChat;

        async function addMessage(sender, text) {
            const chatbox = document.getElementById("chatbox");
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            chatHistory.push({ sender, content: text, time: timeStr });
            
            try {
                if(isLoggedIn()) await saveBotMessage(sender, text);
            } catch(err) {
                 console.error("Could not save to backend");
            }
            
            let messageHTML = '';
            
            if (sender === 'user') {
                messageHTML = `
                    <div class="message sent">
                        <div class="msg-bubble">
                            <p>${text}</p>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    </div>
                `;
            } else {
                messageHTML = `
                    <div class="message received" style="animation: fadeIn 0.3s ease-out">
                        <img src="assets/chatbot.jpg" alt="EduBot" class="msg-avatar">
                        <div class="msg-bubble">
                            <p>${text}</p>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    </div>
                `;
            }
            
            chatbox.insertAdjacentHTML('beforeend', messageHTML);
            chatbox.scrollTop = chatbox.scrollHeight; // Auto-scroll
        }

        function findResponse(input) {
            const lowerInput = input.toLowerCase().trim();
            for (const key in responses) {
                if (key !== "default" && lowerInput.includes(key)) {
                    return responses[key];
                }
            }
            return responses["default"];
        }

        function sendQuickReply(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function sendMessage() {
            const inputField = document.getElementById("userInput");
            const userText = inputField.value.trim();
            
            if (userText === "") return;
            
            addMessage('user', userText);
            inputField.value = "";
            
            setTimeout(() => {
                const botResponse = findResponse(userText);
                addMessage('bot', botResponse);
            }, 600);
        }

        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', renderInitialChat);
    </script>
</body>
</html>
